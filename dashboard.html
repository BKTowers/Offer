<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BKTowers</title>

<style>
body {
    font-family: "Segoe UI";
    direction: rtl;
    background: #f8fafc;
    margin: 0;
}

.header {
    background: #1e3a8a;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

/* info */
.info {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.info input {
    padding: 8px;
    width: 300px;
}

/* tables */
.report-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.report-table th,
.report-table td {
    border: 2px solid #444;
    padding: 10px;
    text-align: center;
}

.report-table th {
    background: #d1d5db;
}

/* inputs */
input {
    padding: 8px;
    margin: 5px;
}

/* buttons */
button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.add { background: #2563eb; color: white; }
.del { background: #dc2626; color: white; }
.edit { background: #64748b; color: white; }

.section-title {
    margin-top: 20px;
}

/* print */
@media print {
    button, input {
        display: none;
    }
    body {
        background: white;
    }
}
</style>
</head>

<body>

<div class="header">
<h2>مكتب BKTowers</h2>
<h3>عرض إدارة أملاك</h3>
</div>

<div class="container">

<!-- CLIENT -->
<div class="info">
<h3>عرض مقدم لـ:</h3>
<input id="clientName" placeholder="اسم المالك / الفندق">
</div>

<!-- ADD UNIT -->
<h3 class="section-title">إضافة شقة</h3>
<input id="unitNo" placeholder="رقم الشقة">
<input id="price" type="number" placeholder="السعر">
<input id="desc" placeholder="الوصف">
<button class="add" onclick="addUnit()">إضافة</button>

<table class="report-table">
<thead>
<tr>
<th>رقم الشقة</th>
<th>السعر</th>
<th>الوصف</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="unitsTable"></tbody>
</table>

<!-- EXPENSES -->
<h3 class="section-title">المصروفات</h3>
<input id="expName" placeholder="النوع">
<input id="expPrice" type="number" placeholder="المبلغ">
<button class="add" onclick="addExp()">إضافة</button>

<table class="report-table">
<thead>
<tr>
<th>النوع</th>
<th>المبلغ</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="expTable"></tbody>
</table>

<!-- RESULTS -->
<h3 class="section-title">النتائج</h3>

<table class="report-table">
<thead>
<tr>
<th>البند</th>
<th>القيمة</th>
</tr>
</thead>
<tbody>
<tr><td>الإيراد</td><td id="rev">0</td></tr>
<tr><td>المصروفات</td><td id="costValue">0</td></tr>
<tr><td>الربح قبل العمولة</td><td id="profitValue">0</td></tr>
<tr><td>العمولة</td><td id="feeValue">0</td></tr>
<tr><td>الربح بعد العمولة</td><td id="afterValue">0</td></tr>
</tbody>
</table>

<!-- COMMISSION -->
<div style="margin-top:10px;">
<input id="comm" type="number" placeholder="نسبة العمولة %" oninput="render()">
<label><input type="checkbox" id="use" onchange="render()"> تفعيل العمولة</label>
</div>

<br>
<button onclick="window.print()">🖨 طباعة</button>

</div>

<script>

let units = [];
let expenses = [];

// ADD UNIT
function addUnit(){
    let no = unitNo.value;
    let p = Number(price.value);
    let d = desc.value;

    if(!no || !p || !d) return;

    units.push({no,p,d});

    unitNo.value="";
    price.value="";
    desc.value="";

    render();
}

// ADD EXPENSE
function addExp(){
    let n = expName.value;
    let p = Number(expPrice.value);

    if(!n || !p) return;

    expenses.push({n,p});

    expName.value="";
    expPrice.value="";

    render();
}

// RENDER
function render(){

    // units
    unitsTable.innerHTML = units.map((u,i)=>`
    <tr>
        <td>${u.no}</td>
        <td>${u.p}</td>
        <td>${u.d}</td>
        <td>
            <button class="edit" onclick="editUnit(${i})">تعديل</button>
            <button class="del" onclick="deleteUnit(${i})">حذف</button>
        </td>
    </tr>`).join("");

    // expenses
    expTable.innerHTML = expenses.map((e,i)=>`
    <tr>
        <td>${e.n}</td>
        <td>${e.p}</td>
        <td>
            <button class="edit" onclick="editExp(${i})">تعديل</button>
            <button class="del" onclick="deleteExp(${i})">حذف</button>
        </td>
    </tr>`).join("");

    // calculations
    let revenue = units.reduce((sum,u)=>sum + u.p,0);
    let cost = expenses.reduce((sum,e)=>sum + e.p,0);
    let profit = revenue - cost;

    let percent = Number(comm.value) || 0;
    let use = document.getElementById("use").checked;

    let fee = use ? revenue * percent / 100 : 0;
    let after = profit - fee;

    // display
    document.getElementById("rev").innerText = revenue;
    document.getElementById("costValue").innerText = cost;
    document.getElementById("profitValue").innerText = profit;
    document.getElementById("feeValue").innerText = fee;
    document.getElementById("afterValue").innerText = after;
}

// edit/delete
function editUnit(i){
    unitNo.value = units[i].no;
    price.value = units[i].p;
    desc.value = units[i].d;
    units.splice(i,1);
    render();
}

function deleteUnit(i){
    units.splice(i,1);
    render();
}

function editExp(i){
    expName.value = expenses[i].n;
    expPrice.value = expenses[i].p;
    expenses.splice(i,1);
    render();
}

function deleteExp(i){
    expenses.splice(i,1);
    render();
}

</script>

</body>
</html>
