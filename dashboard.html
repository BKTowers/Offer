<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BKTowers</title>

<style>
body {font-family:Segoe UI;direction:rtl;background:#f8fafc;margin:0;}
.header {background:#1e3a8a;color:white;padding:20px;text-align:center;}
.container {padding:20px;max-width:1100px;margin:auto;}
.report-table {width:100%;border-collapse:collapse;margin-top:10px;}
.report-table th,.report-table td {border:2px solid #444;padding:10px;text-align:center;}
.report-table th {background:#d1d5db;}
input,select {padding:8px;margin:5px;}
button {padding:6px 10px;border:none;border-radius:5px;cursor:pointer;}
.add{background:#2563eb;color:white;}
.del{background:#dc2626;color:white;}
.edit{background:#64748b;color:white;}
.printBtn{background:#16a34a;color:white;margin-top:15px;}

@media print{
    button,input,select{display:none;}
}
</style>
</head>

<body>

<div class="header">
<h2>مكتب BKTowers</h2>
<h3>عرض إدارة أملاك</h3>
<p id="dateNow"></p>
<p id="clientText" style="font-weight:bold;"></p>
</div>

<div class="container">

<h3>عرض مقدم لـ:</h3>
<input id="clientName" placeholder="اسم المالك / الفندق" oninput="updateClient()">

<h3>إضافة شقة</h3>
<input id="unitNo" placeholder="رقم الشقة">
<input id="desc" placeholder="الوصف">

<select id="statusSelect" onchange="togglePriceField()">
<option value="occupied">مؤجرة</option>
<option value="empty">متاحة</option>
</select>

<input id="priceInput" type="number" placeholder="السعر">

<button class="add" onclick="addUnit()">إضافة</button>

<table class="report-table">
<thead>
<tr>
<th>رقم الشقة</th>
<th>الوصف</th>
<th>الحالة</th>
<th>السعر</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="unitsTable"></tbody>
</table>

<h3>المصروفات</h3>
<input id="expName" placeholder="النوع">
<input id="expPrice" type="number" placeholder="المبلغ">
<button class="add" onclick="addExpense()">إضافة</button>

<table class="report-table">
<tbody id="expTable"></tbody>
</table>

<h3>النتائج</h3>

<table class="report-table">
<tbody>
<tr><td>الإيراد</td><td id="rev">0</td></tr>
<tr><td>المصروفات</td><td id="cost">0</td></tr>
<tr><td>الربح</td><td id="profit">0</td></tr>
<tr><td>نسبة الإشغال</td><td id="occupancy">0%</td></tr>

<tr id="feeRow" style="display:none;">
<td>العمولة</td><td id="fee">0</td>
</tr>

<tr id="afterRow" style="display:none;">
<td>بعد العمولة</td><td id="after">0</td>
</tr>

</tbody>
</table>

<input id="commission" type="number" placeholder="العمولة %" oninput="render()">
<label><input type="checkbox" id="useCommission" onchange="render()"> تفعيل العمولة</label>

<!-- زر الطباعة -->
<button class="printBtn" onclick="window.print()">🖨 طباعة</button>

</div>

<script>

let units = [];
let expenses = [];

document.getElementById("dateNow").innerText =
"التاريخ: " + new Date().toLocaleDateString('ar-EG');

function updateClient(){
    const name = document.getElementById("clientName").value;
    document.getElementById("clientText").innerText =
    name ? "عرض مقدم إلى: " + name : "";
}

function togglePriceField(){
    const status = document.getElementById("statusSelect").value;
    const priceInput = document.getElementById("priceInput");

    if(status === "empty"){
        priceInput.disabled = true;
        priceInput.value = "";
    } else {
        priceInput.disabled = false;
    }
}

function addUnit(){
    const no = document.getElementById("unitNo").value;
    const desc = document.getElementById("desc").value;
    const status = document.getElementById("statusSelect").value;
    const price = Number(document.getElementById("priceInput").value) || 0;

    if(!no || !desc) return;

    units.push({no,desc,status,price});

    document.getElementById("unitNo").value="";
    document.getElementById("desc").value="";
    document.getElementById("priceInput").value="";

    render();
}

function addExpense(){
    const name = document.getElementById("expName").value;
    const price = Number(document.getElementById("expPrice").value);

    if(!name || !price) return;

    expenses.push({name,price});

    document.getElementById("expName").value="";
    document.getElementById("expPrice").value="";

    render();
}

function render(){

    document.getElementById("unitsTable").innerHTML =
    units.map((u,i)=>`
    <tr>
        <td>${u.no}</td>
        <td>${u.desc}</td>
        <td>${u.status==="occupied"?"مؤجرة":"متاحة"}</td>
        <td>${u.status==="occupied"?u.price:"-"}</td>
        <td><button onclick="deleteUnit(${i})">❌</button></td>
    </tr>`).join("");

    document.getElementById("expTable").innerHTML =
    expenses.map(e=>`
    <tr><td>${e.name}</td><td>${e.price}</td></tr>
    `).join("");

    const occupied = units.filter(u=>u.status==="occupied");

    const revenue = occupied.reduce((sum,u)=>sum+u.price,0);
    const cost = expenses.reduce((sum,e)=>sum+e.price,0);
    const profit = revenue - cost;

    const occupancy = units.length ? ((occupied.length/units.length)*100).toFixed(1):0;

    const percent = Number(document.getElementById("commission").value) || 0;
    const use = document.getElementById("useCommission").checked;

    let fee = 0;
    let after = profit;

    if(use && percent>0){
        fee = revenue * percent/100;
        after = profit - fee;
        feeRow.style.display="";
        afterRow.style.display="";
    } else {
        feeRow.style.display="none";
        afterRow.style.display="none";
    }

    rev.innerText = revenue;
    cost.innerText = cost;
    profit.innerText = profit;
    occupancy.innerText = occupancy + "%";
    fee.innerText = fee;
    after.innerText = after;
}

function deleteUnit(i){
    units.splice(i,1);
    render();
}

</script>

</body>
</html>
