<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BKTowers</title>

<style>
body {
    font-family: "Segoe UI";
    direction: rtl;
    background: #f8fafc;
    margin: 0;
}

.header {
    background: #1e3a8a;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

.report-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.report-table th,
.report-table td {
    border: 2px solid #444;
    padding: 10px;
    text-align: center;
}

.report-table th {
    background: #d1d5db;
}

input, select {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.add { background: #2563eb; color: white; }
.del { background: #dc2626; color: white; }
.edit { background: #64748b; color: white; }

.screen-only { display: block; }
.print-only { display: none; }

@media print {
    button, input, select { display: none; }
    .screen-only { display: none; }
    .print-only { display: block; }
}
</style>
</head>

<body>

<div class="header">
<h2>مكتب BKTowers</h2>
<h3>عرض إدارة أملاك</h3>
<p id="dateNow"></p>

<p class="print-only">
<strong>عرض مقدم لـ:</strong>
<span id="clientDisplay"></span>
</p>
</div>

<div class="container">

<!-- CLIENT -->
<div class="screen-only">
<h3>عرض مقدم لـ:</h3>
<input id="clientName" placeholder="اسم المالك / الفندق" oninput="updateClient()">
</div>

<!-- ADD UNIT -->
<h3>إضافة شقة</h3>
<input id="unitNo" placeholder="رقم الشقة">
<input id="desc" placeholder="الوصف">

<select id="status" onchange="togglePrice()">
<option value="occupied">مؤجرة</option>
<option value="empty">متاحة</option>
</select>

<input id="price" type="number" placeholder="السعر">

<button class="add" onclick="addUnit()">إضافة</button>

<table class="report-table">
<thead>
<tr>
<th>رقم الشقة</th>
<th>الوصف</th>
<th>الحالة</th>
<th>السعر</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="unitsTable"></tbody>
</table>

<!-- EXPENSES -->
<h3>المصروفات</h3>
<input id="expName" placeholder="النوع">
<input id="expPrice" type="number" placeholder="المبلغ">
<button class="add" onclick="addExp()">إضافة</button>

<table class="report-table">
<thead>
<tr>
<th>النوع</th>
<th>المبلغ</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="expTable"></tbody>
</table>

<!-- RESULTS -->
<h3>النتائج</h3>

<table class="report-table">
<tbody>
<tr><td>الإيراد الشهري</td><td id="rev">0</td></tr>
<tr><td>الإيراد السنوي</td><td id="yearly">0</td></tr>
<tr><td>المصروفات</td><td id="cost">0</td></tr>
<tr><td>الربح قبل العمولة</td><td id="profit">0</td></tr>
<tr><td>نسبة الإشغال</td><td id="occupancy">0%</td></tr>

<tr id="feeRow" style="display:none;">
<td>العمولة</td><td id="fee">0</td>
</tr>

<tr id="afterRow" style="display:none;">
<td>الربح بعد العمولة</td><td id="after">0</td>
</tr>
</tbody>
</table>

<input id="comm" type="number" placeholder="العمولة %" oninput="render()">
<label><input type="checkbox" id="use" onchange="render()"> تفعيل العمولة</label>

<br><br>
<button onclick="window.print()">🖨 طباعة</button>

</div>

<script>

let units = [];
let expenses = [];

// date
dateNow.innerText = "التاريخ: " + new Date().toLocaleDateString('ar-EG');

// client
function updateClient(){
    clientDisplay.innerText = clientName.value;
}

// toggle price
function togglePrice(){
    if(status.value === "empty"){
        price.disabled = true;
        price.value = "";
    } else {
        price.disabled = false;
    }
}

// add unit
function addUnit(){
    let no = unitNo.value;
    let d = desc.value;
    let s = status.value;
    let p = Number(price.value) || 0;

    if(!no || !d) return;

    units.push({no,d,s,p});

    unitNo.value="";
    desc.value="";
    price.value="";

    render();
}

// add expense
function addExp(){
    let n = expName.value;
    let p = Number(expPrice.value);

    if(!n || !p) return;

    expenses.push({n,p});

    expName.value="";
    expPrice.value="";

    render();
}

// render
function render(){

    unitsTable.innerHTML = units.map((u,i)=>`
    <tr>
        <td>${u.no}</td>
        <td>${u.d}</td>
        <td>${u.s === "occupied" ? "مؤجرة" : "متاحة"}</td>
        <td>${u.s === "occupied" ? u.p : "-"}</td>
        <td>
            <button class="edit" onclick="editUnit(${i})">تعديل</button>
            <button class="del" onclick="deleteUnit(${i})">حذف</button>
        </td>
    </tr>`).join("");

    expTable.innerHTML = expenses.map((e,i)=>`
    <tr>
        <td>${e.n}</td>
        <td>${e.p}</td>
        <td>
            <button class="edit" onclick="editExp(${i})">تعديل</button>
            <button class="del" onclick="deleteExp(${i})">حذف</button>
        </td>
    </tr>`).join("");

    let occupiedUnits = units.filter(u => u.s === "occupied");
    let revenue = occupiedUnits.reduce((sum,u)=>sum + u.p,0);
    let yearly = revenue * 12;

    let cost = expenses.reduce((sum,e)=>sum + e.p,0);
    let profit = revenue - cost;

    let occupancyRate = units.length ? (occupiedUnits.length / units.length * 100).toFixed(1) : 0;

    let percent = Number(comm.value) || 0;
    let use = useCheckbox.checked;

    let fee = use ? revenue * percent / 100 : 0;
    let after = profit - fee;

    // show/hide
    if(use && percent > 0){
        feeRow.style.display = "";
        afterRow.style.display = "";
    } else {
        feeRow.style.display = "none";
        afterRow.style.display = "none";
    }

    // display
    rev.innerText = revenue;
    yearly.innerText = yearly;
    cost.innerText = cost;
    profit.innerText = profit;
    occupancy.innerText = occupancyRate + "%";
    fee.innerText = fee;
    after.innerText = after;
}

// edit/delete
function editUnit(i){
    unitNo.value = units[i].no;
    desc.value = units[i].d;
    status.value = units[i].s;
    price.value = units[i].p;
    units.splice(i,1);
    togglePrice();
    render();
}

function deleteUnit(i){
    units.splice(i,1);
    render();
}

function editExp(i){
    expName.value = expenses[i].n;
    expPrice.value = expenses[i].p;
    expenses.splice(i,1);
    render();
}

function deleteExp(i){
    expenses.splice(i,1);
    render();
}

</script>

</body>
</html>
