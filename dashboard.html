<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BKTowers</title>

<style>
body {
    font-family: "Segoe UI";
    direction: rtl;
    background: #f8fafc;
    margin: 0;
}

.header {
    background: #1e3a8a;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

/* ===== TABLE STYLE (زي الصورة) ===== */
.report-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.report-table th,
.report-table td {
    border: 2px solid #444;
    padding: 10px;
    text-align: center;
    font-size: 15px;
}

.report-table th {
    background: #d1d5db;
    font-weight: bold;
}

.report-table td {
    background: #f9fafb;
}

/* inputs */
input {
    padding: 8px;
    margin: 5px;
}

/* buttons */
button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.add { background: #2563eb; color: white; }
.del { background: #dc2626; color: white; }
.edit { background: #64748b; color: white; }

/* results */
.results {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.big { font-size: 18px; font-weight: bold; }
.green { color: #16a34a; }
.red { color: #dc2626; }

/* print */
@media print {
    button, input {
        display: none;
    }
    body {
        background: white;
    }
}
</style>
</head>

<body>

<div class="header">
<h2>مكتب BKTowers - إدارة أملاك</h2>
</div>

<div class="container">

<!-- ADD UNIT -->
<h3>إضافة شقة</h3>
<input id="unitNo" placeholder="رقم الشقة">
<input id="price" type="number" placeholder="السعر">
<input id="desc" placeholder="الوصف (غرفة وصالة)">
<button class="add" onclick="addUnit()">إضافة</button>

<!-- UNITS TABLE -->
<table class="report-table">
<thead>
<tr>
<th>رقم الشقة</th>
<th>السعر</th>
<th>الوصف</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="unitsTable"></tbody>
</table>

<!-- EXPENSES -->
<h3>المصروفات</h3>
<input id="expName" placeholder="النوع">
<input id="expPrice" type="number" placeholder="المبلغ">
<button class="add" onclick="addExp()">إضافة</button>

<table class="report-table">
<thead>
<tr>
<th>النوع</th>
<th>المبلغ</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="expTable"></tbody>
</table>

<!-- RESULTS -->
<div class="results">
<h3>النتائج</h3>

<p>الإيراد: <span id="rev" class="big green">0</span></p>
<p>المصروفات: <span id="cost" class="big red">0</span></p>
<p>الربح قبل العمولة: <span id="profit" class="big green">0</span></p>

<input id="comm" type="number" placeholder="العمولة %" oninput="render()">
<label><input type="checkbox" id="use" onchange="render()"> تفعيل العمولة</label>

<p>العمولة: <span id="fee" class="big red">0</span></p>
<p>الربح بعد العمولة: <span id="after" class="big green">0</span></p>

<button onclick="window.print()">🖨 طباعة</button>
</div>

</div>

<script>

let units = [];
let expenses = [];

// ADD UNIT
function addUnit(){
    let no = unitNo.value;
    let priceVal = Number(price.value);
    let descVal = desc.value;

    if(!no || !priceVal || !descVal) return;

    units.push({no, price: priceVal, desc: descVal});

    unitNo.value="";
    price.value="";
    desc.value="";

    render();
}

// ADD EXPENSE
function addExp(){
    let n = expName.value;
    let p = Number(expPrice.value);

    if(!n || !p) return;

    expenses.push({n,p});

    expName.value="";
    expPrice.value="";

    render();
}

// RENDER
function render(){

    // units table
    unitsTable.innerHTML = units.map((u,i)=>`
    <tr>
        <td>${u.no}</td>
        <td>${u.price}</td>
        <td>${u.desc}</td>
        <td>
            <button class="edit" onclick="editUnit(${i})">تعديل</button>
            <button class="del" onclick="deleteUnit(${i})">حذف</button>
        </td>
    </tr>`).join("");

    // expenses table
    expTable.innerHTML = expenses.map((e,i)=>`
    <tr>
        <td>${e.n}</td>
        <td>${e.p}</td>
        <td>
            <button class="edit" onclick="editExp(${i})">تعديل</button>
            <button class="del" onclick="deleteExp(${i})">حذف</button>
        </td>
    </tr>`).join("");

    let revenue = units.reduce((sum,u)=>sum + u.price,0);
    let cost = expenses.reduce((sum,e)=>sum + e.p,0);
    let profit = revenue - cost;

    let percent = Number(comm.value) || 0;
    let use = document.getElementById("use").checked;

    let fee = use ? revenue * percent / 100 : 0;
    let after = profit - fee;

    rev.innerText = revenue;
    cost.innerText = cost;
    profit.innerText = profit;
    fee.innerText = fee;
    after.innerText = after;
}

// EDIT / DELETE
function editUnit(i){
    unitNo.value = units[i].no;
    price.value = units[i].price;
    desc.value = units[i].desc;
    units.splice(i,1);
    render();
}

function deleteUnit(i){
    units.splice(i,1);
    render();
}

function editExp(i){
    expName.value = expenses[i].n;
    expPrice.value = expenses[i].p;
    expenses.splice(i,1);
    render();
}

function deleteExp(i){
    expenses.splice(i,1);
    render();
}

</script>

</body>
</html>
