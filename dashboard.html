<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BKTowers</title>

<style>
body {
    font-family: "Segoe UI";
    direction: rtl;
    background: #f8fafc;
    margin: 0;
}

.header {
    background: #1e3a8a;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

.report-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

.report-table th,
.report-table td {
    border: 2px solid #444;
    padding: 10px;
    text-align: center;
}

.report-table th {
    background: #d1d5db;
}

input, select {
    padding: 8px;
    margin: 5px;
}
