<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BKTowers</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "offer-545cd.firebaseapp.com",
  projectId: "offer-545cd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveDB = async (data)=> {
  await setDoc(doc(db,"appData","main"), data);
};

window.loadDB = async ()=> {
  const snap = await getDoc(doc(db,"appData","main"));
  return snap.exists()? snap.data(): null;
};
</script>

</head>

<body>

<div class="sidebar">
<h2>BKTowers</h2>
<button onclick="location.href='dashboard.html'">Dashboard</button>
<button onclick="location.href='reports.html'">التقارير</button>
</div>

<div class="main">

<h1>لوحة التحكم</h1>

<div class="card">
<h3>إضافة شقة</h3>
<input id="name" placeholder="اسم الشقة">
<input id="price" type="number">
<select id="type">
<option value="month">شهري</option>
<option value="year">سنوي</option>
<option value="day">يومي</option>
</select>
<button onclick="addUnit()">إضافة</button>
<div id="unitsList"></div>
</div>

<div class="card">
<h3>المصروفات</h3>
<input id="expName">
<input id="expPrice" type="number">
<button onclick="addExp()">إضافة</button>
<div id="expList"></div>
</div>

<div class="card grid">
<div>الإيراد: <span id="rev" class="big green"></span></div>
<div>المصروفات: <span id="cost" class="big red"></span></div>
<div>الربح: <span id="profit" class="big green"></span></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<button onclick="saveAll()">💾 حفظ</button>

</div>

<script src="app.js"></script>

</body>
</html>
